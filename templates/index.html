<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PedroGPT</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f0f1a;
    color:white;
    height:100vh;
    display:flex;
}

/* SIDEBAR (PC ONLY) */
.sidebar{
    width:260px;
    background:#171717;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
    border-right:1px solid #2f2f2f;
}

.sidebar h2{
    text-align:center;
}

.usuario{
    background:#2b2b2b;
    padding:12px;
    border-radius:8px;
    text-align:center;
}

/* BOTÕES */
.nova-conversa{
    border:none;
    background:#19c37d;
    color:white;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.logout{
    text-decoration:none;
    color:white;
    background:#444;
    padding:10px;
    border-radius:8px;
    text-align:center;
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* HEADER */
.header{
    padding:15px;
    text-align:center;
    background:#202123;
    border-bottom:1px solid #333;
}

/* CHAT */
.chat{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* MENSAGENS */
.msg{
    max-width:75%;
    padding:12px 14px;
    border-radius:18px;
    word-wrap:break-word;
    font-size:14px;
    line-height:1.4;
    position:relative;
}

.user{
    align-self:flex-end;
    background:#0b93f6;
    border-bottom-right-radius:4px;
}

.bot{
    align-self:flex-start;
    background:#343541;
    border-bottom-left-radius:4px;
}

/* HORA */
.hora{
    font-size:10px;
    opacity:0.5;
    margin-top:5px;
    text-align:right;
}

/* INPUT */
.entrada{
    display:flex;
    gap:10px;
    padding:12px;
    border-top:1px solid #333;
    background:#202123;
}

.entrada input{
    flex:1;
    padding:14px;
    border:none;
    border-radius:10px;
    outline:none;
    background:#343541;
    color:white;
}

.entrada button{
    padding:14px 18px;
    border:none;
    border-radius:10px;
    background:#19c37d;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* OPÇÕES */
.opcoes{
    padding:10px 15px;
    border-bottom:1px solid #333;
    font-size:13px;
}

/* SCROLL */
.chat::-webkit-scrollbar{
    width:6px;
}
.chat::-webkit-scrollbar-thumb{
    background:#444;
    border-radius:10px;
}

/* DIGITANDO */
.typing{
    opacity:0.6;
    font-style:italic;
}

/* MOBILE */
@media(max-width:768px){

    body{
        flex-direction:column;
    }

    .sidebar{
        display:none;
    }

    .chat{
        padding-bottom:80px;
    }

    .entrada{
        position:sticky;
        bottom:0;
    }
}
</style>

</head>
<body>

<div class="sidebar">

    <h2>🤖 PedroGPT</h2>

    <div class="usuario">
        Olá, {{ username }}
    </div>

    <button class="nova-conversa" onclick="novaConversa()">
        🆕 Nova Conversa
    </button>

    <a href="/logout" class="logout">
        Sair
    </a>

</div>

<div class="main">

    <div class="header">
        PedroGPT
    </div>

    <div class="opcoes">
        <label>
            <input type="checkbox" id="voz" checked>
            🔊 Ouvir respostas
        </label>
    </div>

    <div id="chat" class="chat"></div>

    <div class="entrada">
        <input type="text" id="mensagem" placeholder="Digite sua mensagem..." autocomplete="off">
        <button onclick="enviar()">Enviar</button>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
