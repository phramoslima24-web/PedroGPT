<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PedroGPT</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    display: flex;
    height: 100vh;
    background: radial-gradient(circle at top, #111827, #0b0f19);
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(12px);
    border-right: 1px solid rgba(255,255,255,0.08);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.sidebar h2 {
    text-align: center;
}

.usuario {
    background: rgba(255,255,255,0.05);
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    font-size: 14px;
}

/* BOTÕES */
.nova-conversa {
    border: none;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.logout {
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.08);
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* CHAT */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: none; /* começa escondido */
    flex-direction: column;
    gap: 10px;
}

/* INPUT */
.entrada {
    display: flex;
    gap: 10px;
    padding: 15px;
}

.entrada input {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: none;
}

.entrada button {
    padding: 14px 18px;
    border-radius: 10px;
    border: none;
    background: #7c3aed;
    color: white;
    cursor: pointer;
}

/* WELCOME */
.welcome {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 15px;
    background: radial-gradient(circle at top, #111827, #0b0f19);
    text-align: center;
}

.quick-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 10px;
}

.quick {
    padding: 10px 14px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    cursor: pointer;
    transition: 0.2s;
}

.quick:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.15);
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>🤖 PedroGPT</h2>

    <div class="usuario">
        Olá, {{ username }}
    </div>

    <button class="nova-conversa">🆕 Nova Conversa</button>

    <a href="/logout" class="logout">Sair</a>
</div>

<div class="main">

    <div id="chat" class="chat"></div>

    <!-- WELCOME -->
    <div id="welcome" class="welcome">
        <h2>🤖 PedroGPT</h2>
        <p>Como posso ajudar hoje?</p>

        <div class="quick-actions">
            <div class="quick" onclick="quickAction('Criar código 💻')">💻 Criar código</div>
            <div class="quick" onclick="quickAction('Estudar 📚')">📚 Estudar</div>
            <div class="quick" onclick="quickAction('Fazer resumo 📝')">📝 Fazer resumo</div>
            <div class="quick" onclick="quickAction('Tirar dúvidas ❓')">❓ Tirar dúvidas</div>
        </div>
    </div>

    <!-- INPUT -->
    <div class="entrada">
        <input type="text" id="mensagem" placeholder="Digite sua mensagem...">
        <button onclick="enviar()">Enviar</button>
    </div>

</div>

<script>
// =====================
// WELCOME SYSTEM RESET
// =====================
function quickAction(texto) {
    document.getElementById("welcome").style.display = "none";
    document.getElementById("chat").style.display = "flex";

    const input = document.getElementById("mensagem");
    input.value = texto;
    input.focus();
}
</script>

</body>
</html>
