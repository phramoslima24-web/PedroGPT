<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PedroGPT</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    display: flex;
    height: 100vh;
    background: linear-gradient(135deg, #0f0f1a, #1f1f2e, #2c2f3a);
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(14px);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    border-right: 1px solid rgba(255,255,255,0.12);
}

.sidebar h2 {
    font-size: 20px;
    letter-spacing: 0.5px;
}

.usuario {
    font-size: 14px;
    opacity: 0.8;
}

/* BOTÕES */
button, .logout {
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: 0.2s ease;
    font-weight: 500;
}

button:hover, .logout:hover {
    transform: scale(1.04);
    opacity: 0.9;
}

.nova-conversa {
    background: linear-gradient(90deg, #7c3aed, #4f46e5);
    color: white;
}

.logout {
    background: rgba(255,255,255,0.08);
    color: white;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 15px;
    background: rgba(0,0,0,0.28);
    text-align: center;
    font-weight: bold;
    letter-spacing: 1px;
}

/* OPÇÕES */
.opcoes {
    padding: 10px 15px;
    font-size: 13px;
    opacity: 0.85;
}

/* CHAT */
.chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* MENSAGENS */
.msg {
    max-width: 70%;
    padding: 12px 14px;
    border-radius: 16px;
    word-wrap: break-word;
    line-height: 1.5;
    animation: fadeIn 0.2s ease;
    font-size: 14px;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
}

.user {
    align-self: flex-end;
    background: #7c3aed;
    box-shadow: 0 4px 10px rgba(124,58,237,0.3);
}

.bot {
    align-self: flex-start;
    background: rgba(255,255,255,0.08);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* INPUT */
.entrada {
    display: flex;
    padding: 12px;
    background: rgba(0,0,0,0.28);
    gap: 10px;
}

.entrada input {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    outline: none;
    background: rgba(255,255,255,0.95);
    font-size: 14px;
}

.entrada button {
    background: linear-gradient(90deg, #7c3aed, #4f46e5);
    color: white;
    padding: 12px 18px;
    border-radius: 12px;
    transition: 0.2s;
    font-weight: bold;
}

.entrada button:hover {
    transform: scale(1.06);
}

/* SCROLL */
.chat::-webkit-scrollbar {
    width: 6px;
}

.chat::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 10px;
}
</style>

</head>
<body>

<div class="sidebar">

    <h2>🤖 PedroGPT</h2>

    <div class="usuario">
        Olá, {{ username }}
    </div>

    <button class="nova-conversa" onclick="novaConversa()">
        🆕 Nova Conversa
    </button>

    <a href="/logout" class="logout">
        Sair
    </a>

</div>

<div class="main">

    <div class="header">
        PedroGPT
    </div>

    <div class="opcoes">
        <label>
            <input type="checkbox" id="voz" checked>
            🔊 Ouvir respostas
        </label>
    </div>

    <div id="chat" class="chat"></div>

    <div class="entrada">
        <input type="text" id="mensagem" placeholder="Digite sua mensagem..." autocomplete="off">
        <button onclick="enviar()">Enviar</button>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
