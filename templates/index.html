<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PedroGPT</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    display: flex;
    height: 100vh;
    background: #0f0f1a;
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    background: #171717;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    border-right: 1px solid #2f2f2f;
}

.sidebar h2 {
    text-align: center;
}

.usuario {
    background: #2b2b2b;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    font-size: 14px;
}

/* BOTÕES */
.nova-conversa {
    border: none;
    background: #19c37d;
    color: white;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.nova-conversa:hover {
    opacity: 0.9;
}

.logout {
    text-decoration: none;
    color: white;
    background: #444;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
}

.logout:hover {
    background: #666;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.header {
    padding: 20px;
    border-bottom: 1px solid #333;
    text-align: center;
}

/* OPÇÕES */
.opcoes {
    padding: 10px 20px;
    border-bottom: 1px solid #333;
    font-size: 14px;
}

/* CHAT */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* MENSAGENS */
.msg-user {
    align-self: flex-end;
    background: #0b93f6;
    color: white;
    padding: 12px;
    border-radius: 12px;
    max-width: 75%;
    word-wrap: break-word;
}

.msg-bot {
    align-self: flex-start;
    background: #343541;
    color: white;
    padding: 12px;
    border-radius: 12px;
    max-width: 75%;
    word-wrap: break-word;
}

/* INPUT */
.entrada {
    display: flex;
    gap: 10px;
    padding: 20px;
    border-top: 1px solid #333;
}

.entrada input {
    flex: 1;
    padding: 15px;
    border: none;
    border-radius: 10px;
    outline: none;
    background: #343541;
    color: white;
}

.entrada button {
    padding: 15px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #19c37d;
    color: white;
    font-weight: bold;
}

.entrada button:hover {
    opacity: 0.9;
}

/* MOBILE */
@media(max-width: 768px) {
    body {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: space-between;
    }

    .main {
        height: 100%;
    }
}
</style>

</head>
<body>

<div class="sidebar">

    <h2>🤖 PedroGPT</h2>

    <div class="usuario">
        Olá, {{ username }}
    </div>

    <button class="nova-conversa" onclick="novaConversa()">
        🆕 Nova Conversa
    </button>

    <a href="/logout" class="logout">
        Sair
    </a>

</div>

<div class="main">

    <div class="header">
        PedroGPT
    </div>

    <div class="opcoes">
        <label>
            <input type="checkbox" id="voz" checked>
            🔊 Ouvir respostas
        </label>
    </div>

    <div id="chat" class="chat"></div>

    <div class="entrada">
        <input type="text" id="mensagem" placeholder="Digite sua mensagem..." autocomplete="off">
        <button onclick="enviar()">Enviar</button>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
