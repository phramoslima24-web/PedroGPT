<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PedroGPT</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="sidebar">

    <h2>🤖 PedroGPT</h2>

    <div class="usuario">
        Olá, {{ username }}
    </div>

    <a href="/logout" class="logout">
        Sair
    </a>

</div>

<div class="main">

    <div class="header">
        <h1>PedroGPT</h1>
    </div>

    <!-- OPÇÕES -->
    <div class="opcoes">

        <label>
            <input type="checkbox" id="voz" checked>
            🔊 Ouvir respostas
        </label>

    </div>

    <!-- CHAT -->
    <div id="chat" class="chat"></div>

    <!-- ENTRADA -->
    <div class="entrada">

        <input
            type="text"
            id="mensagem"
            placeholder="Digite sua mensagem..."
            autocomplete="off"
        >

        <button onclick="enviar()">
            Enviar
        </button>

    </div>

</div>

<!-- 🔥 SCRIPT JS (OBRIGATÓRIO) -->
<script src="/static/script.js"></script>

</body>
</html>
