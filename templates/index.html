<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PedroGPT</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    background:#0f1115;
    color:white;
}

/* SIDEBAR (PC ONLY) */
.sidebar{
    width:260px;
    background:rgba(255,255,255,0.04);
    border-right:1px solid rgba(255,255,255,0.08);
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.usuario{
    padding:10px;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    padding:15px;
    text-align:center;
    background:rgba(255,255,255,0.03);
    border-bottom:1px solid rgba(255,255,255,0.08);
    font-weight:bold;
}

/* CHAT */
.chat{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* BOLHAS MODERNAS */
.msg{
    max-width:75%;
    padding:12px 14px;
    border-radius:14px;
    font-size:14px;
    line-height:1.4;
    word-wrap:break-word;
    animation:fade .2s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(5px);}
    to{opacity:1; transform:translateY(0);}
}

.user{
    align-self:flex-end;
    background:#7c3aed;
}

.bot{
    align-self:flex-start;
    background:rgba(255,255,255,0.06);
}

/* INPUT */
.entrada{
    display:flex;
    padding:12px;
    gap:10px;
    background:rgba(255,255,255,0.03);
    border-top:1px solid rgba(255,255,255,0.08);
}

.entrada input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.08);
    color:white;
}

.entrada button{
    padding:12px 16px;
    border:none;
    border-radius:10px;
    background:#7c3aed;
    color:white;
    cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
    .sidebar{
        display:none;
    }
}
</style>

</head>
<body>

<div class="sidebar">
    <h2>🤖 PedroGPT</h2>
    <div class="usuario">Olá, {{ username }}</div>

    <button class="nova-conversa" onclick="novaConversa()">Nova conversa</button>
    <a href="/logout" style="color:white;text-decoration:none;">Sair</a>
</div>

<div class="main">

    <div class="header">PedroGPT</div>

    <div id="chat" class="chat"></div>

    <div class="entrada">
        <input type="text" id="mensagem" placeholder="Digite sua mensagem...">
        <button onclick="enviar()">Enviar</button>
    </div>

</div>

<script>
async function carregarHistorico(){
    const res = await fetch("/history");
    const data = await res.json();

    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    data.forEach(m=>{
        addMsg(m[1], m[0]);
    });
}

function addMsg(texto, tipo){
    const div = document.createElement("div");
    div.classList.add("msg");
    div.classList.add(tipo === "user" ? "user" : "bot");

    div.textContent = texto;

    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
}

async function enviar(){
    const input = document.getElementById("mensagem");
    const texto = input.value.trim();
    if(!texto) return;

    addMsg(texto,"user");
    input.value="";

    const res = await fetch("/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:texto})
    });

    const data = await res.json();
    addMsg(data.reply,"bot");
}

async function novaConversa(){
    await fetch("/new_chat",{method:"POST"});
    document.getElementById("chat").innerHTML="";
}

carregarHistorico();
</script>

</body>
</html>
