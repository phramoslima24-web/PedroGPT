<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PedroGPT</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f0f1a, #1f1f2e, #2c2f3a);
    color: white;
}

.card {
    width: 360px;
    padding: 35px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border: none;
    border-radius: 12px;
    outline: none;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #7c3aed, #4f46e5);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

a {
    display: block;
    margin-top: 15px;
    color: #c4b5fd;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="card">
    <h2>🤖 PedroGPT</h2>

    <input type="text" id="username" placeholder="Usuário">
    <input type="password" id="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <a href="/register">Criar conta</a>
</div>

<script>

// ❌ REMOVE AUTO LOOP COMPLETAMENTE
// NÃO usar localStorage para login aqui

async function login() {

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        alert("Preencha tudo");
        return;
    }

    const res = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {
        // 🔥 só redireciona, NÃO usa localStorage
        window.location.href = "/";
    } else {
        alert(data.message || "Login inválido");
    }
}

</script>

</body>
</html>
