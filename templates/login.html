<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PedroGPT</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #202123;
    color: white;
}

.card {
    width: 360px;
    padding: 30px;
    border-radius: 15px;
    background: #2c2f3a;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border: none;
    border-radius: 10px;
    outline: none;
    background: #eceff6;
}

/* SENHA */
.senha-box {
    position: relative;
    width: 100%;
}

.senha-box input {
    padding-right: 45px;
}

.eye {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    border: 2px solid #999;
    border-radius: 5px;
    cursor: pointer;
}

.eye.active {
    background: #7c3aed;
    border-color: #7c3aed;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #bdbdbd;
    font-weight: bold;
    cursor: pointer;
}

a {
    display: block;
    margin-top: 12px;
    color: #7c4dff;
    text-decoration: none;
}
</style>

</head>
<body>

<div class="card">

<h2>🤖 Login</h2>

<input type="text" id="username" placeholder="Usuário">

<div class="senha-box">
    <input type="password" id="password" placeholder="Senha">
    <span class="eye" id="eye" onclick="toggleSenha()"></span>
</div>

<button onclick="login()">Entrar</button>

<a href="/register">Criar conta</a>

</div>

<script>

// =========================
// AUTO LOGIN (CORRIGIDO)
// =========================
if (localStorage.getItem("logged") === "true") {
    window.location.replace("/");
}

// =========================
// TOGGLE SENHA
// =========================
function toggleSenha() {
    const senha = document.getElementById("password");
    const eye = document.getElementById("eye");

    if (senha.type === "password") {
        senha.type = "text";
        eye.classList.add("active");
    } else {
        senha.type = "password";
        eye.classList.remove("active");
    }
}

// =========================
// LOGIN
// =========================
async function login() {

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    const res = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {
        localStorage.setItem("logged", "true");
        localStorage.setItem("user", username);

        window.location = "/";
    } else {
        alert(data.message || "Erro ao logar");
    }
}

</script>

</body>
</html>
