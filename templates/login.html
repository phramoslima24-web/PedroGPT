<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PedroGPT</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1c1f26, #2b2d31, #1a1c22);
    color: white;
}

.card {
    width: 360px;
    padding: 35px;
    border-radius: 18px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 14px 36px 14px 14px; /* espaço pro olho */
    margin-top: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.08);
    color: white;
    outline: none;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #7c3aed, #5b21b6);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    transform: scale(1.03);
}

a {
    display: block;
    margin-top: 14px;
    color: #a78bfa;
    text-decoration: none;
    font-size: 13px;
}

.senha-box {
    position: relative;
    margin-top: 10px;
}

.eye-box {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 5px;
    cursor: pointer;
    transition: 0.2s;
}

.eye-box.active {
    background: #7c3aed;
    border-color: #7c3aed;
}
</style>

</head>
<body>

<div class="card">

<h2>🤖 Login</h2>

<input type="text" id="username" placeholder="Usuário">

<div class="senha-box">
    <input type="password" id="password" placeholder="Senha">
    <span class="eye-box" id="btnOlho" onclick="toggleSenha()"></span>
</div>

<button onclick="login()">Entrar</button>

<a href="/registro">Criar conta</a>

</div>

<script>

function toggleSenha() {
    const senha = document.getElementById("password");
    const box = document.getElementById("btnOlho");

    if (senha.type === "password") {
        senha.type = "text";
        box.classList.add("active");
    } else {
        senha.type = "password";
        box.classList.remove("active");
    }
}

async function login() {

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    const res = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {
        window.location = "/";
    } else {
        alert(data.message || "Erro ao logar");
    }
}

</script>

</body>
</html>
