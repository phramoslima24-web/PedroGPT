<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PedroGPT</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background: linear-gradient(135deg, #1c1f26, #2b2d31, #1a1c22);
}

/* CARD MODERNO */
.card {
    width: 360px;
    padding: 35px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    color: white;
    text-align: center;
}

/* TÍTULO */
h2 {
    margin-bottom: 20px;
    font-size: 24px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 14px;
    transition: 0.3s;
}

input:focus {
    border: 1px solid #7c3aed;
    background: rgba(255,255,255,0.12);
}

/* BOTÃO */
button {
    width: 100%;
    padding: 14px;
    margin-top: 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #7c3aed, #5b21b6);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0 5px 20px rgba(124,58,237,0.4);
}

/* LINK */
a {
    display: block;
    margin-top: 14px;
    color: #a78bfa;
    text-decoration: none;
    font-size: 13px;
}

/* SENHA */
.senha-box {
    position: relative;
    margin-top: 10px;
}

.eye {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    opacity: 0.8;
    transition: 0.2s;
}

.eye:hover {
    opacity: 1;
}
</style>

</head>
<body>

<div class="card">

    <h2>🤖 PedroGPT</h2>

    <input type="text" id="username" placeholder="Usuário">

    <div class="senha-box">
        <input type="password" id="password" placeholder="Senha">
        <span class="eye" id="btnOlho" onclick="mostrarSenha()">👁️</span>
    </div>

    <button onclick="login()">Entrar</button>

    <a href="/registro">Criar conta</a>

</div>

<script>

function mostrarSenha() {

    const senha = document.getElementById("password");
    const botao = document.getElementById("btnOlho");

    if (senha.type === "password") {
        senha.type = "text";
        botao.textContent = "🙈";
    } else {
        senha.type = "password";
        botao.textContent = "👁️";
    }
}

async function login() {

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        alert("Preencha usuário e senha");
        return;
    }

    try {

        const resposta = await fetch("/api/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
        });

        const data = await resposta.json();

        if (data.success) {
            window.location = "/";
        } else {
            alert(data.message || "Login inválido");
        }

    } catch (erro) {
        alert("Erro no servidor");
        console.error(erro);
    }
}

// ENTER
document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        login();
    }
});

</script>

</body>
</html>
