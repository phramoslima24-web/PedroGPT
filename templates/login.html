<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PedroGPT</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="main" style="justify-content:center;align-items:center;">

    <div style="width:350px;background:#343541;padding:25px;border-radius:15px;">

        <h2 style="text-align:center;margin-bottom:20px;">
            🤖 PedroGPT
        </h2>

        <input
            type="text"
            id="username"
            placeholder="Usuário"
            style="width:100%;padding:12px;margin-bottom:10px;"
        >

        <!-- SENHA + OLHINHO -->
        <div style="display:flex;gap:5px;margin-bottom:10px;align-items:center;">

            <input
                type="password"
                id="password"
                placeholder="Senha"
                style="width:100%;padding:12px;"
            >

            <button
                type="button"
                onclick="mostrarSenha()"
                id="btnOlho"
                style="padding:12px;cursor:pointer;border:none;background:none;font-size:18px;"
            >
                👁️
            </button>

        </div>

        <button
            onclick="login()"
            style="width:100%;padding:12px;cursor:pointer;"
        >
            Entrar
        </button>

        <p style="margin-top:15px;text-align:center;">
            <!-- ✔ CORRIGIDO AQUI -->
            <a href="/registro">Criar conta</a>
        </p>

    </div>

</div>

<script>

function mostrarSenha() {

    const senha = document.getElementById("password");
    const botao = document.getElementById("btnOlho");

    if (!senha || !botao) return;

    if (senha.type === "password") {
        senha.type = "text";
        botao.textContent = "🙈";
    } else {
        senha.type = "password";
        botao.textContent = "👁️";
    }
}

async function login() {

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        alert("Preencha usuário e senha");
        return;
    }

    try {

        const resposta = await fetch("/api/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username,
                password
            })
        });

        const data = await resposta.json();

        if (data.success) {
            window.location = "/";
        } else {
            alert(data.message || "Login inválido");
        }

    } catch (erro) {
        alert("Erro no servidor");
        console.error(erro);
    }
}

// ENTER funciona
document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        login();
    }
});

</script>

</body>
</html>
